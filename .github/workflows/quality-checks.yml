name: Quality Checks

on:
  push:
    branches: [main, develop]
    paths:
      - 'skills/**/rules/**/*.md'
  pull_request:
    branches: [main, develop]
    paths:
      - 'skills/**/rules/**/*.md'

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check for duplicate rule titles and tag sets
        run: pnpm check-duplicates

      - name: Check tag hygiene (min/max count, lowercase, no duplicates)
        run: pnpm check-tags

      - name: Print skill statistics
        run: pnpm stats
